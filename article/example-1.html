(function() {
  const darkMode = localStorage.getItem('darkMode')

  const prefersDark =
    window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches

  const defaultAppearance = 'light'

  let shouldBeDark = darkMode === 'true' || darkMode === 'dark'

  if (darkMode === null) {
    if (defaultAppearance === 'dark') {
      shouldBeDark = true
    } else if (defaultAppearance === 'auto') {
      // 检查是否在深色模式时间范围内
      const date = new Date()
      const hours = date.getHours()
      const darkTimeStart = 18
      const darkTimeEnd = 6
      
      shouldBeDark = prefersDark || (hours >= darkTimeStart || hours < darkTimeEnd)
    }
  }
  
  // 立即设置 html 元素的类
  document.documentElement.classList.add(shouldBeDark ? 'dark' : 'light')
})()

90d37-6a81-4349-a933-994d66be84a5","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"1abda074-6cad-8333-9038-814a13daabb7":{"value":{"id":"1abda074-6cad-8333-9038-814a13daabb7","version":2,"type":"text","properties":{"title":[["君不见黄河之水天上来，奔流到海不复回。\n君不见高堂明镜悲白发，朝如青丝暮成雪。\n人生得意须尽欢，莫使金樽空对月。\n天生我材必有用，千金散尽还复来。\n烹羊宰牛且为乐，会须一饮三百杯。\n岑夫子，丹丘生，将进酒，杯莫停。\n与君歌一曲，请君为我倾耳听。\n钟鼓馔玉不足贵，但愿长醉不愿醒。\n古来圣贤皆寂寞，惟有饮者留其名。\n陈王昔时宴平乐，斗酒十千恣欢谑。\n主人何为言少钱，径须沽取对君酌。\n五花马、千金裘，呼儿将出换美酒，与尔同销万古愁。"]]},"format":{"copied_from_pointer":{"id":"189c6309-f15e-47ad-a135-a14f36cda7e4","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760600,"last_edited_time":1776368760600,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"189c6309-f15e-47ad-a135-a14f36cda7e4","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"1ddda074-6cad-8294-a826-01b5f2de03c6":{"value":{"id":"1ddda074-6cad-8294-a826-01b5f2de03c6","version":2,"type":"bookmark","properties":{"link":[["https://tangly1024.com/"]],"title":[["TANGLY's BLOG | 记录思考、分享我的学习笔记"]],"description":[["记录思考、分享我的学习笔记"]]},"format":{"bookmark_icon":"https://tangly1024.com/favicon.ico","bookmark_cover":"https://images.unsplash.com/photo-1564419320603-628d868a193f?q=50\u0026fm=jpg\u0026fit=crop\u0026w=1920\u0026h=1600","copied_from_pointer":{"id":"3a5174d9-05b5-4b29-bdb7-9be20977e8af","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760601,"last_edited_time":1776368760601,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"3a5174d9-05b5-4b29-bdb7-9be20977e8af","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"e15da074-6cad-82bf-a8cf-011b853060b9":{"value":{"id":"e15da074-6cad-82bf-a8cf-011b853060b9","version":1,"type":"external_object_instance","format":{"integration_id":"cdc46cd9-f0e9-48fd-b3aa-18481098e29e","is_placeholder":true,"copied_from_pointer":{"id":"fdceaba7-a336-4c8d-b710-5e6ea3ed90ca","table" ied_from":"fd4c19bc-0de4-40ea-a038-8e0c97744ff3","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"75dda074-6cad-83c2-ab1c-816c8019c3af":{"value":{"id":"75dda074-6cad-83c2-ab1c-816c8019c3af","version":2,"type":"text","properties":{"title":[["系统支持 Waline\\Giscus\\Valine\\GitTalk\\Utterance\\Cusdis\\Twikoo六种评论插件，并且可以同时开启，点击评论区的Tab来体验。"]]},"format":{"copied_from_pointer":{"id":"f0b6509e-dfc7-4cc6-a02d-29e2c5d2dcea","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760606,"last_edited_time":1776368760606,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"f0b6509e-dfc7-4cc6-a02d-29e2c5d2dcea","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"973da074-6cad-8372-bb79-01f0803d625a":{"value":{"id":"973da074-6cad-8372-bb79-01f0803d625a","version":2,"type":"text","properties":{"title":[["按照以下教程可以开启响应的评论插件"]]},"format":{"copied_from_pointer":{"id":"f729e406-9158-4baa-9043-148399a69893","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760606,"last_edited_time":1776368760606,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"f729e406-9158-4baa-9043-148399a69893","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"664da074-6cad-835a-b8e8-0136f5fa4b5f":{"value":{"id":"664da074-6cad-835a-b8e8-0136f5fa4b5f","version":2,"type":"bookmark","properties":{"link":[["https://tangly1024.com/article/notionnext-twikoo"]],"title":[["NotionNext配置评论插件Twikoo | TANGLY's BLOG"]],"description":[["一个简洁、安全、免费的静态网站评论系统，基于 腾讯云开发 。 经评论区网友推荐，我开始使用 Twikoo，一番体验，发现Twikoo真的很强大，目前我决定用它作为主要评论插件。 twikoo支持在页面上直接管理评论、配置插件，非常强大 在最新版本中 NotionNext已经 支持该评论插件，配置 方法很简单： 在Vercel后台添加一个环境变量 NEXT_PUBLIC_COMMENT_ENV_ID ; 值为您部署好的 twikoo 后台地址。以我的举例： 借助vercel，您可以非常快速地部署自己的twikoo后台，用于储存评论数据。 twikoo的后台数据存储是基于MongoDB数据库的，我们可以先注册创建一个免费的在线MongoDB数据库。 创建MongoDB数据库 1.注册账号 创建数据库 这里下方要设置一个允许访问该数据库的IP地址，推荐设置0.0.0.0，即所有地址都允许访问，毕竟我也不知道自己会用什么ip访问这个数据库。 2.获取数据库连接地址 Vercel一键部署 点击Create将twikoo的代码拷入您的仓库 配置MongoDB数据库地址 添加一个配置 MONGODB_URI 环境变量即可，其值为上一步获得的MongoDB连接地址，注意将链接中MONGODB的密码 替换成您设置的。 上述部署完成后，您将获得一个vercel的twikoo后台页面，您可以选择像我一样映射成二级域名 将您的twikoo后台地址配置在NotionNext的后台，并redeploy即可。 到此完成~ 点击右下角的小齿轮即可配置您的管理员密码、并进行更多的功能设置。赶快体验吧~ 可以访问官方文档获取安装部署帮助，并且查看Twikoo的更多特性。 NotionNext支持多种评论插件，可访问以下文章获得帮助："]]},"format":{"bookmark_icon":"https://tangly1024.com/favicon.ico","bookmark_cover":"https://images.unsplash.com/photo-1564419320603-628d868a193f?ixlib=rb-4.0.3\u0026q=80\u0026fm=jpg\u0026crop=entropy\u0026cs=tinysrgb","copied_from_pointer":{"id":"d35a0f34-d6b5-4a61-81a0-36518f8e6f7b","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760605,"last_edited_time":1776368760605,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"d35a0f34-d6b5-4a61-81a0-36518f8e6f7b","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"a62da074-6cad-83d3-bd30-01bd53682734":{"value":{"id":"a62da074-6cad-83d3-bd30-01bd53682734","version":2,"type":"bookmark","properties":{"link":[["https://tangly1024.com/article/notion-next-comment-plugin"]],"title":[["NotionNext如何添加评论插件 | TANGLY's BLOG"]],"description":[["NotionNext支持多种评论插件，其中体验比较好的我个人觉得是Twikoo，您可以参考以下教程进行配置安装： 您也可以选择Valine/Waline，关于Valine/Waline的部署可以访问此篇文章： Utterance 、 Giscus 、Gitalk 其中部署最便捷的当属 Cusdis 和 Utterance 这两个插件。您可以任选一个部署，当然，您也可以选择同时部署多个。 完成效果预览 点击Start for free ，并用Github登录即可 Sign in With Github (点击查看截图) [可选] 配置邮件通知地址，以便收到新评论时邮件通知您，（点击展开截图） 点击Embed Code获取您的应用ID，即data-app-id, 复制这串id备用。 在Vercel后台添加一个环境变量 NEXT_PUBLIC_COMMENT_CUSDIS_APP_ID，值为上面获取到的data-app-id。 完成预览效果 在您的Github中创建一个开源项目用于存放评论 在github中安装utterance插件 允许utterance访问所有仓库，并勾选install，可以只勾选作为评论用的仓库地址。 将用作评论仓库名添加到Vercel添加环境变量 后台 settings→ environment variables → 添加 → save 即可。如下图： 注意， 仓库名的格式是 [您的用户名/您的仓库名] 如下示例 完成预览效果 在您的Github中创建一个开源项目用于存放评论 创建一个授权秘钥，并保存您的ClientID与ClientSecret Authorization callback URL 填写您网站域名 填写配置的效果 ，点击 register application 即可创建。 点击 Generate a new client secret 生成您的密码 复制 Client ID和刚生成的 Client secret （对应图中2和3）备用。 在Vercel后台配置环境变量 NEXT_PUBLIC_COMMENT_GITALK_CLIENT_ID NEXT_PUBLIC_COMMENT_GITALK_CLIENT_SECRET NEXT_PUBLIC_COMMENT_GITALK_CLIENT_ID NEXT_PUBLIC_COMMENT_GITALK_CLIENT_SECRET 项目会在您的Github项目讨论区创建评论数据，便于维护管理 , 完成效果 预览 您可以在Github的Discusstion讨论区随时管理评论。 在您的Github中创建一个开源项目用于存放评论 在项目Setting中开启discussion功能 在Github中安装giscus应用 点击右上方的Install即可，并确认 允许访问仓库数据权限： 默认勾选All repositories即可。也可以只勾选用作评论的仓库，（后续还可以再回来配置） 访问Giscus填写并获取您的Giscus配置参数 主要配置输入您的仓库名，并选择 Discussion分类为 Announcements ."]]},"format":{"bookmark_icon":"https://tangly1024.com/favicon.ico","bookmark_cover":"https://tangly1024.com/bg_image.jpg","copied_from_pointer":{"id":"83caa5ef-f141-412a-a469-542d934d7147","table":"block","spaceId":"6c096b44-beb9-48ee-8f92-1efdde47f3a3"}},"created_time":1776368760603,"last_edited_time":1776368760603,"parent_id":"205da074-6cad-83c4-a987-819c2dacda5d","parent_table":"block","alive":true,"copied_from":"83caa5ef-f141-412a-a469-542d934d7147","space_id":"07eda074-6cad-814f-86ce-0003fa9b9435"}},"7c9da074-6cad-8340-8e29-014393ac3608":{"value":{"id":"7c9da074-6cad-8340-8e29-014393ac3608","version":2,"type":"bookmark","properties":{"link":[["https://tangly1024.com/article/notionnext-valine"]],"title":[["NotionNext配置Valine/Waline评论插件 | TANGLY's BLOG"]],"description":[["Valine插件需要LeanCloud后端提供数据库存储功能，请按照以下步骤配置。 而Waline 的前置步骤和Valine基本一致，只是多了一个部署Waline的Vercel服务步骤。由于Waline配置了完善的后台管理功能，所以使用Waline就不需要再配合Admin-Valine项目运行。 应用创建好以后，进入刚刚创建的应用，选择左下角的 设置\u003e 应用Key，然后就能看到你的 APP ID和 APP Key 了： 为了你的数据安全，请设置自己的 安全域名 ：只有以下设置的域名，才允许访问你的valine数据 支持的Valine配置在NotionNext项目的blog.config.js 中，请在Vercel后台的环境变量中配置： serverURLs在应用内部会尝试自动获取，如果发现获取失败，请手动提供 刚刚创建的应用，选择左下角的 设置\u003e 应用Key，找到 Request 域名 第一行 需要在akismet中注册账号并获取免费的key： https://akismet.com/account ，并在LeanCloud中配置 AKISMET_KEY 变量 参考官方文档，在你的Vercel上部署一个valine应用。而后在你的NotionNext环境变量中添加你的waline服务地址环境变量： NEXT_PUBLIC_WALINE_SERVER_URL 即可生效。"]]},"format":{"bookmark_icon":"https://tangly1024.com/favicon.ico","boo
