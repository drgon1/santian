name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main-clean
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NOTION_PAGE_ID: 097e5f674880459d8e1b4407758dc4fb
          NEXT_PUBLIC_THEME: simple
          NEXT_PUBLIC_LANG: zh-CN
          NEXT_PUBLIC_AUTHOR: AI 军事游戏观察
          NEXT_PUBLIC_BIO: 专注于AI、军事、游戏领域的观察与分析
          NEXT_PUBLIC_LINK: https://drgon1.github.io/santian
          NEXT_PUBLIC_KEYWORD: AI, 军事, 游戏, 科技, 博客
      - name: Export
        run: npm run export
        env:
          NOTION_PAGE_ID: 097e5f674880459d8e1b4407758dc4fb
          NEXT_PUBLIC_THEME: simple
          NEXT_PUBLIC_LANG: zh-CN
          NEXT_PUBLIC_AUTHOR: AI 军事游戏观察
          NEXT_PUBLIC_BIO: 专注于AI、军事、游戏领域的观察与分析
          NEXT_PUBLIC_LINK: https://drgon1.github.io/santian
          NEXT_PUBLIC_KEYWORD: AI, 军事, 游戏, 科技, 博客
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out