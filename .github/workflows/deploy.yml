name: Deploy to GitHub Pages
on:
  push:
    branches:
      - main-clean
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Build and Export
        run: npm run build
        env:
          NOTION_PAGE_ID: fc4da0746cad836189b901ffac8745c5
          NEXT_PUBLIC_THEME: simple
          NEXT_PUBLIC_LANG: zh-CN
          NEXT_PUBLIC_AUTHOR: AI 军事游戏观察
          NEXT_PUBLIC_BIO: 专注于AI、军事、游戏领域的观察与分析
          NEXT_PUBLIC_LINK: https://drgon1.github.io/santian
          NEXT_PUBLIC_KEYWORD: AI, 军事, 游戏, 科技, 博客
          EXPORT: true
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4